version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sleepercell-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sleepercell
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  server:
    build: ./server
    container_name: sleepercell-server
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/sleepercell
      - PORT=3000
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - db
    restart: unless-stopped

  app:
    build: ./app
    container_name: sleepercell-app
    ports:
      - "5173:5173"
    environment:
      - VITE_HMR_HOST=0.0.0.0
    volumes:
      - ./app:/app
      - /app/node_modules
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
